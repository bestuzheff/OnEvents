title: "ЧёПоСтандартам: инструкция, которую никто не читает, а потом страдает"
date: "2026-03-03"
pic: "2026-03-03_RI.jpg"
description: |
  <p>Стандарты 1С часто воспринимают как “про оформление кода”: отступы, скобки, переносы.</p>
  <br>
  <p>Но в какой-то момент выясняется: в стандартах уже есть ответы на кучу типовых рабочих ситуаций, из-за которых мы спорим в ревью, ломаем архитектуру и тратим часы на “ну я так привык”.</p>
  <br>
  <p>На стриме разберем:</p>
  <p>➡️ Стандарты глазами новичка: что я думал о них в начале и почему это было наивно.</p>
  <p>➡️ Почему в вакансиях требуют, но на собеседованиях редко спрашивают.</p>
  <p>➡️ Страх опозориться: как он мешает и как превращается в мотивацию (в том числе через блогинг).</p>
  <p>➡️ Открытие “в стандартах ответы”: как быстро находить нужные места и применять их к задачам, а не к “красоте кода”.</p>
  <p>➡️ Главный вывод: стандарты нужно периодически перечитывать, потому что память и реальность расходятся.</p>
  <br>
  <p>Приглашенный гость:</p>
  <p>😶‍🌫️Роман Чумадин, автор блога <a href="http://t.me/e_budni_programmer">Е.БУДНИ программиста 1С</a> и рубрики «ЧёПоСтандартам».</p>
  <br>
  <p>Формат: разговор + разбор примеров + вопросы из чата.</p>
