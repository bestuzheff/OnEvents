title: "ПОЧЕМУ БИБЛИОТЕКИ 1С ТАКИЕ ОГРОМНЫЕ"
date: "2026-03-10"
pic: "2026-03-10_RI.jpg"
description: |
  <p>1С-разработчики постоянно используют библиотеки.</p>
  <p>Но почти никто не обсуждает почему они устроены именно так.</p>
  <br>
  <p>Почему одна библиотека тянет за собой половину конфигурации?</p>
  <p>Почему обновления превращаются в отдельный вид спорта?</p>
  <p>И почему в мире есть NPM, пакеты и dependency management, а в 1С всё выглядит… мягко говоря, иначе.</p>
  <br>
  <p>Дата: 10 марта в 19:00</p>
  <p>На стриме разберём:</p>
  <p>➡️ что вообще такое библиотеки и какие они бывают</p>
  <p>➡️ как библиотеки устроены в других языках и экосистемах</p>
  <p>➡️ как распространяются библиотеки в мире (NPM, пакеты, OS) и как это выглядит в 1С</p>
  <p>➡️ dependency hell и почему библиотеки в 1С часто получаются огромными</p>
  <p>➡️ зачем делить решения на подсистемы и как это связано с поддоменами разработки</p>
  <p>➡️ почему программные интерфейсы делать легко, а пользовательские — уже нет</p>
  <p>➡️ как разработчики БСП пытаются облегчить обновления и как с этим живут реальные команды</p>
  <br>
  <p>😶‍🌫️Приглашённый гость — Евгений Кузнецов, BiaTech, Старший инженер отдела R&D</p>
  <br>
  <p>Поговорим про архитектуру, исторические решения платформы и те компромиссы, с которыми сталкивается почти каждый 1С-разработчик.</p>
