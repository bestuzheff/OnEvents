description: |
  <p>На прошедшей <a href="https://t.me/kungfu_conf/67">КУНГ-ФУ КОНФЕ 16 мая в Екатеринбурге</a> я провел два мастер-класса.</p>  
  <br>
  <p>🟡 Первый — для программистов: вайбкодинг на 1С «Проще простого». Показывал, как быстро, нагло и прямо «в лоб» по ссылке на публикацию Инфостарта собрать такую же внешнюю обработку.</p>
  <br>
  <p>🟡 Второй — для консультантов и аналитиков: решение бизнес-задач с помощью MCP. Ситуация классическая: в кабинет врывается разъяренный директор, тычет пальцем в отчет и спрашивает: «Откуда эта цифра?!» А вы с 1С работаете совсем недавно. По спине уже бежит легкий пот, в голове начинает шуметь, и единственная мысль: «С чего вообще начинать?» Так вот. Начинать не нужно. Цифру в отчете и то, откуда она взялась в 1С, найдет ИИ-агент вместо вас.</p>
  <br>
  <p>Нормальное видео с конференции записать не получилось, поэтому решил повторить все на стриме, пока сам еще помню, что показывал 😉</p>
